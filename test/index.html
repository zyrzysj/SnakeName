<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简易贪吃蛇</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(135deg, #101820, #203a43, #2c5364);
      color: #f5f7fa;
    }

    .game-wrap {
      width: min(92vw, 520px);
      padding: 24px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      letter-spacing: 4px;
    }

    .score-board {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 18px;
    }

    .score-board span {
      flex: 1;
      padding: 10px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.22);
    }

    canvas {
      width: 100%;
      max-width: 440px;
      aspect-ratio: 1;
      display: block;
      margin: 0 auto 16px;
      border: 4px solid rgba(255, 255, 255, 0.25);
      border-radius: 16px;
      background: #17212b;
    }

    .tips {
      margin: 0 0 16px;
      color: #d7e1ea;
      line-height: 1.7;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 26px;
      font-size: 16px;
      font-weight: 700;
      color: #102027;
      background: #7ee787;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(126, 231, 135, 0.35);
    }

    .status {
      min-height: 24px;
      margin-top: 14px;
      color: #ffd166;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="game-wrap">
    <h1>贪吃蛇</h1>
    <div class="score-board">
      <span>得分：<strong id="score">0</strong></span>
      <span>最高分：<strong id="bestScore">0</strong></span>
    </div>
    <canvas id="game" width="440" height="440" aria-label="贪吃蛇游戏画布"></canvas>
    <p class="tips">使用方向键或 WASD 控制方向；吃到红色食物会变长，撞墙或撞到自己则游戏结束。</p>
    <button id="startBtn">开始 / 重新开始</button>
    <div class="status" id="status">点击按钮开始游戏</div>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestScoreEl = document.getElementById('bestScore');
    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;
    const speed = 120;

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let bestScore = Number(localStorage.getItem('snakeBestScore')) || 0;
    let timer = null;
    let isRunning = false;

    bestScoreEl.textContent = bestScore;
    drawStartScreen();

    startBtn.addEventListener('click', startGame);
    document.addEventListener('keydown', handleKeydown);

    function startGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      scoreEl.textContent = score;
      statusEl.textContent = '游戏进行中...';
      food = createFood();
      isRunning = true;

      clearInterval(timer);
      timer = setInterval(gameLoop, speed);
      draw();
    }

    function gameLoop() {
      direction = nextDirection;
      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (hitWall(head) || hitSelf(head)) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        food = createFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function handleKeydown(event) {
      const keyMap = {
        ArrowUp: { x: 0, y: -1 },
        w: { x: 0, y: -1 },
        W: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 },
        s: { x: 0, y: 1 },
        S: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 },
        a: { x: -1, y: 0 },
        A: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 },
        d: { x: 1, y: 0 },
        D: { x: 1, y: 0 }
      };

      const newDirection = keyMap[event.key];
      if (!newDirection) return;

      event.preventDefault();
      if (!isRunning) return;

      const isReverse = newDirection.x + direction.x === 0 && newDirection.y + direction.y === 0;
      if (!isReverse) {
        nextDirection = newDirection;
      }
    }

    function createFood() {
      let newFood;
      do {
        newFood = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake.some(part => part.x === newFood.x && part.y === newFood.y));

      return newFood;
    }

    function hitWall(position) {
      return position.x < 0 || position.x >= tileCount || position.y < 0 || position.y >= tileCount;
    }

    function hitSelf(position) {
      return snake.some(part => part.x === position.x && part.y === position.y);
    }

    function endGame() {
      clearInterval(timer);
      isRunning = false;
      statusEl.textContent = `游戏结束！最终得分：${score}`;

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('snakeBestScore', bestScore);
        bestScoreEl.textContent = bestScore;
        statusEl.textContent += '，刷新最高分！';
      }
    }

    function draw() {
      drawBoard();
      drawFood();
      drawSnake();
    }

    function drawBoard() {
      ctx.fillStyle = '#17212b';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
      for (let i = 0; i <= tileCount; i++) {
        const pos = i * gridSize;
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(canvas.width, pos);
        ctx.stroke();
      }
    }

    function drawSnake() {
      snake.forEach((part, index) => {
        ctx.fillStyle = index === 0 ? '#7ee787' : '#38c172';
        roundedRect(part.x * gridSize + 2, part.y * gridSize + 2, gridSize - 4, gridSize - 4, 6);
      });
    }

    function drawFood() {
      ctx.fillStyle = '#ff5c5c';
      ctx.beginPath();
      ctx.arc(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, gridSize / 2 - 3, 0, Math.PI * 2);
      ctx.fill();
    }

    function roundedRect(x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.fill();
    }

    function drawStartScreen() {
      ctx.fillStyle = '#17212b';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#d7e1ea';
      ctx.font = '24px Microsoft YaHei, Arial';
      ctx.textAlign = 'center';
      ctx.fillText('点击开始按钮', canvas.width / 2, canvas.height / 2 - 10);
      ctx.font = '16px Microsoft YaHei, Arial';
      ctx.fillText('方向键 / WASD 控制', canvas.width / 2, canvas.height / 2 + 24);
    }
  </script>
</body>
</html>
